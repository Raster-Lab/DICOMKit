name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  SWIFT_VERSION: '6.2'

jobs:
  validate-release:
    name: Validate Release
    runs-on: macos-15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
      
    - name: Get tag name
      id: get_tag
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
        else
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi
        
    - name: Validate version tag
      run: |
        TAG=${{ steps.get_tag.outputs.tag }}
        if [[ ! $TAG =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::Invalid version tag format: $TAG (expected: v1.2.3)"
          exit 1
        fi
        echo "✅ Valid version tag: $TAG"
        
    - name: Build and test
      run: |
        swift build -c release
        swift test
        
  build-cli-tools:
    name: Build CLI Tools (Batch ${{ matrix.batch }})
    runs-on: macos-15
    needs: validate-release
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - batch: "1"
            tools: "dicom-info dicom-convert dicom-validate dicom-anon dicom-dump dicom-query dicom-send dicom-diff dicom-retrieve dicom-split"
          - batch: "2"
            tools: "dicom-merge dicom-json dicom-xml dicom-pdf dicom-image dicom-dcmdir dicom-archive dicom-export dicom-qr dicom-wado"
          - batch: "3"
            tools: "dicom-echo dicom-print dicom-mwl dicom-mpps dicom-pixedit dicom-tags dicom-uid dicom-compress dicom-study dicom-script"
          - batch: "4"
            tools: "dicom-report dicom-measure dicom-viewer dicom-cloud dicom-3d dicom-ai dicom-gateway dicom-server"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
      
    - name: Cache Swift Package Manager
      uses: actions/cache@v4
      with:
        path: .build
        key: ${{ runner.os }}-spm-release-batch${{ matrix.batch }}-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-release-batch${{ matrix.batch }}-
          ${{ runner.os }}-spm-release-
          
    - name: Build CLI tools (Batch ${{ matrix.batch }})
      run: |
        for tool in ${{ matrix.tools }}; do
          echo "Building $tool..."
          swift build -c release --product $tool
        done
        
    - name: Stage CLI binaries
      run: |
        mkdir -p staged-bin
        for tool in ${{ matrix.tools }}; do
          if [ -f ".build/release/$tool" ]; then
            cp ".build/release/$tool" staged-bin/
          fi
        done
        
    - name: Upload CLI binaries artifact
      uses: actions/upload-artifact@v4
      with:
        name: cli-binaries-batch-${{ matrix.batch }}
        path: staged-bin/
        
  build-documentation:
    name: Build and Deploy Documentation
    runs-on: macos-15
    needs: validate-release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
      
    - name: Build DocC documentation
      run: |
        mkdir -p docs
        swift package --allow-writing-to-directory ./docs \
          generate-documentation --target DICOMKit \
          --disable-indexing \
          --transform-for-static-hosting \
          --hosting-base-path DICOMKit \
          --output-path ./docs
          
    - name: Create documentation archive
      run: |
        cd docs
        tar -czf ../dicomkit-docs.tar.gz *
        
    - name: Upload documentation artifact
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: dicomkit-docs.tar.gz
        
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-cli-tools, build-documentation]
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Get tag name
      id: get_tag
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
        else
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi
        
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        
    - name: Combine CLI tools into single archive
      run: |
        mkdir -p release/bin
        # Combine binaries from all batch artifacts
        for dir in artifacts/cli-binaries-batch-*/; do
          if [ -d "$dir" ]; then
            cp "$dir"/* release/bin/ 2>/dev/null || true
          fi
        done
        # Create combined archive
        cd release
        tar -czf ../dicomkit-cli-tools-${{ steps.get_tag.outputs.tag }}-macos-arm64.tar.gz bin/
        
    - name: Generate release notes
      id: release_notes
      run: |
        # Extract version from tag (remove 'v' prefix)
        VERSION=${TAG#v}
        
        # Try to find release notes in CHANGELOG.md or RELEASE_NOTES
        if [ -f "RELEASE_NOTES_$TAG.md" ]; then
          cat "RELEASE_NOTES_$TAG.md" > release_notes.md
        elif [ -f "CHANGELOG.md" ]; then
          # Extract section for this version from CHANGELOG
          sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '$d' > release_notes.md
        else
          echo "Release $TAG" > release_notes.md
          echo "" >> release_notes.md
          echo "## Changes" >> release_notes.md
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> release_notes.md
        fi
      env:
        TAG: ${{ steps.get_tag.outputs.tag }}
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_tag.outputs.tag }}
        name: DICOMKit ${{ steps.get_tag.outputs.tag }}
        body_path: release_notes.md
        draft: false
        prerelease: ${{ contains(steps.get_tag.outputs.tag, '-') }}
        files: |
          dicomkit-cli-tools-*.tar.gz
          artifacts/documentation/*.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
  notify-success:
    name: Notify Release Success
    runs-on: ubuntu-latest
    needs: create-release
    if: success()
    
    steps:
    - name: Success notification
      run: |
        echo "✅ Release created successfully!"
        echo "Tag: ${{ needs.create-release.outputs.tag || github.ref_name }}"
